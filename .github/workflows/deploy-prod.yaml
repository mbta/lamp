name: Deploy to Production

on:
  # deploy when version tags are published
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Semantic Version Format
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "$TAG_NAME" =~ v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Tag '$TAG_NAME' valid semantic version."
          else
            echo "Deploy to Production not executed - tags must follow semantic versioning. |
             (e.g. v1.2.3) '$TAG_NAME' does NOT follow semantic versioning."
            exit 1
          fi

  deploy:
    name: Deploy to Production
    needs: validate-tag
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: prod
    uses: ./.github/workflows/deploy-base.yaml
    with:
      environment: prod
      deploy-ingestion: true
      deploy-rail-pm: true
      deploy-bus-pm: true
      deploy-tm-ingestion: true
      deploy-tableau-publisher: true
      deploy-flashback: true
      deploy-lightswitch: true
    secrets:
      DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  run-lightswitch:
    needs: deploy
    uses: ./.github/workflows/run-task.yaml
    with:
      environment: prod
      task: Lightswitch
    permissions:
      contents: read
      id-token: write
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
