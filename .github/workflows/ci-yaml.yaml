name: Validate YAML

on:
  push:
    branches:
      - main
    paths:
      - "**.yaml"
  pull_request:
    paths:
      - "**.yaml"

permissions:
  contents: read

jobs:
  build:
    name: Validate YAML actions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9  # v3
        with:
          persist-credentials: false
      - run: yamllint . -f parsable --strict
      - uses: mbta/actions/zizmor@d4654c250ff478e2192c9afc0b3021df9f3d7912
        with:
          minimum_issue_severity: medium
