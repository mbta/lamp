name: Validate YAML

on:
  push:
    branches:
      - main
    paths:
      - "**.yaml"
  pull_request:
    paths:
      - "**.yaml"

jobs:
  build:
    name: Validate YAML actions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: false
      - run: yamllint . -f parsable --strict
